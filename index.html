<!DOCTYPE html>
<html lang="ja">

<head>
  <!-- 【必須】文字化け防止（日本語なら必ず） -->
  <meta charset="UTF-8">

  <!-- 【必須】スマホ対応 -->
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- 【重要】ページの説明（検索・SNS用） -->
  <meta name="description" content=" このページの内容を120〜160文字で書く">

  <!-- 【超重要】ページタイトル -->
  <title> ページタイトル</title>

  <!-- ===== ここから下は分からなくてOKゾーン ===== -->

  <!-- 【本番用】正しいURL（公開時に設定） -->
  <link rel="canonical" href=" 正式なURL">

  <!-- 【SEO】検索結果で大きい画像を使ってOK -->
  <meta name="robots" content="max-image-preview:large">

  <!-- 【SNS表示】OGP設定 -->
  <meta property="og:type" content="website">
  <meta property="og:locale" content="ja_JP">
  <meta property="og:title" content=" SNS用タイトル">
  <meta property="og:description" content=" SNS用説明文">
  <meta property="og:image" content="./img/ogp.jpg">

  <!-- 【Twitter(X)用】 -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="./img/ogp.jpg">
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/main.css">

</head>

<body>
  <!-- ===== ここから画面に表示される部分 ===== -->

  <header>
    
  </header>

  <main>
    <section>
    </section>
  </main>

  <footer>
    <p>© 2026</p>
  </footer>

  <!-- 【必要になったら】JavaScript -->
  <script src="./js/main.js"></script>
</body>

</html>
